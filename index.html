<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Departamentos</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
}
body{
    font-family: 'Arial', sans-serif;
    background:#0f172a;
    color:white;
    padding:20px;
    box-sizing:border-box;
    text-align:center;
}
h1,h2{text-align:center; margin-bottom:15px;}
#filtroAmbientes{
    width:100%;
    max-width:800px;
    padding:12px;
    margin:10px auto 20px auto;
    display:block;
    border-radius:8px;
    border:none;
    background:#1e293b;
    color:white;
    font-size:16px;
}
.grid{
    display:flex;
    flex-direction:column;
    gap:25px;
    width:100%;
    max-width:800px;
    margin:auto;
}
.card{
    background:#1e293b;
    padding:15px 15px 20px 15px;
    border-radius:12px;
    width:fit-content;  /* tarjeta se adapta al contenido */
    max-width:100%;
    display:inline-block; /* importante para adaptar la altura a la imagen */
    text-align:center;
    box-sizing:border-box;
    transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover{
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
.card img{
    width:100%;
    height:auto;  /* altura automática según imagen */
    max-width:100%;
    object-fit:contain;
    border-radius:10px;
    cursor:pointer;
}
.card h3{
    margin:15px 0 5px 0;
    font-size:20px;
}
.card p.barrio{
    margin:5px 0 10px 0;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
    text-transform:uppercase;
    font-family: 'Georgia', serif;
}
.card p{
    margin:3px 0;
    font-size:16px;
}
.btn{
    margin:8px 5px 0 0;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition: 0.3s;
}
.btn-whatsapp{background:#25D366;color:white;}
.btn-maps{background:#3b82f6;color:white;}
.btn-fotos{background:#f59e0b;color:white;}
.btn-consulta{background:#6366f1;color:white;}
form{
    margin-top:30px;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:100%;
    max-width:800px;
    margin:auto;
    box-sizing:border-box;
    text-align:center;
}
input, select{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:8px;
    border:none;
    font-size:16px;
    box-sizing:border-box;
}
label{display:block;margin-bottom:6px; font-weight:bold;}

/* Modal Carrusel */
.modal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:1000;
    overflow:hidden;
    flex-direction:column;
}
.modal .close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:35px;
    color:white;
    cursor:pointer;
    z-index:1001;
}
.modal .prev, .modal .next{
    position:absolute;
    top:50%;
    font-size:45px;
    color:white;
    cursor:pointer;
    user-select:none;
    transform: translateY(-50%);
    z-index:1001;
}
.modal .prev{left:15px;}
.modal .next{right:15px;}
.modal img{
    display:block;
    max-width:90%;
    max-height:80%;
    object-fit:contain;
    margin:auto;
    border-radius:10px;
}

@media(max-width:768px){
    body{padding:10px;}
    .card img{max-height:200px;}
    .btn{font-size:14px;padding:6px 12px;}
    input, select{font-size:14px;padding:8px;}
    #filtroAmbientes, .grid, form{max-width:100%;}
}
</style>
</head>
<body>

<h1>Departamentos</h1>

<label>Filtrar por ambientes:</label>
<select id="filtroAmbientes">
    <option value="">Todos</option>
</select>

<div id="contenedor" class="grid"></div>

<h2>Formulario de Consulta</h2>
<form id="consultaForm">
    <input type="hidden" id="direccionForm">
    <input type="hidden" id="vendedorForm">

    <label>Nombre:</label>
    <input type="text" id="nombreForm" placeholder="Tu nombre" required>

    <label>Fecha de ingreso:</label>
    <input type="date" id="fechaForm" required>

    <label>Tiempo a alquilar (meses):</label>
    <input type="number" id="tiempoForm" min="1" required>

    <label>Cantidad de personas:</label>
    <input type="number" id="personasForm" min="1" required>

    <label>¿Tienen mascotas?</label>
    <select id="mascotasForm" required>
        <option value="No">No</option>
        <option value="Sí">Sí</option>
    </select>

    <button type="submit" class="btn btn-whatsapp">
        <span>💬</span> Enviar WhatsApp
    </button>
</form>

<!-- Modal Carrusel -->
<div id="modal" class="modal">
    <span class="close" onclick="cerrarModal()">&times;</span>
    <span class="prev" onclick="cambiarFoto(-1)">&#10094;</span>
    <span class="next" onclick="cambiarFoto(1)">&#10095;</span>
    <div style="display:flex; justify-content:center; align-items:center; height:100%;">
        <img id="modalImg" src="">
    </div>
</div>

<script>
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv";
let departamentos = [];
let currentFotos = [];
let currentIndex = 0;

Papa.parse(csvURL,{
    download:true,
    header:true,
    complete:function(results){
        departamentos = results.data.filter(row => row["Dirección"]);
        llenarFiltro();
        mostrarDepartamentos(departamentos);
    }
});

function llenarFiltro(){
    const select = document.getElementById("filtroAmbientes");
    let ambientesSet = new Set(departamentos.map(d=>d["Ambientes"]).filter(Boolean));
    ambientesSet.forEach(a=>{
        let option = document.createElement("option");
        option.value = a;
        option.textContent = a + " ambientes";
        select.appendChild(option);
    });
    select.addEventListener("change",()=>{
        let filtrados = departamentos.filter(d => !select.value || d["Ambientes"] === select.value);
        mostrarDepartamentos(filtrados);
    });
}

function mostrarDepartamentos(lista){
    const contenedor=document.getElementById("contenedor");
    contenedor.innerHTML="";
    lista.forEach((row,index)=>{
        let fotosLinks = [];
        if(row["Fotos"]){
            fotosLinks = row["Fotos"].split(",").map(f=>f.trim()).map(link=>{
                let id = link.match(/[-\w]{25,}/);
                return id ? "https://lh3.googleusercontent.com/d/"+id[0] : null;
            }).filter(Boolean);
        }
        let primera = fotosLinks[0] || "";

        let card = document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <img id="foto${index}" src="${primera}" onclick="abrirModal(${index})">
            <h3>${row["Dirección"]}</h3>
            <p class="barrio">${row["Barrio"] || ""}</p>
            <p>${row["Ambientes"]} ambientes</p>
            <div>
                <button class="btn btn-fotos" onclick="abrirModal(${index})">📸 Ver Fotos</button>
            </div>
            <div style="margin-top:8px;">
                <button class="btn btn-consulta" onclick="seleccionarDepartamento('${row['Dirección']}','${row['Vendedor']}')">💼 Realizar Consulta</button>
                <button class="btn btn-maps" onclick="verEnMaps('${row['Dirección']}')">🗺️ Ver en Google Maps</button>
            </div>
        `;
        card.fotos = fotosLinks;
        card.current = 0;
        contenedor.appendChild(card);
    });
}

function seleccionarDepartamento(direccion, vendedor){
    document.getElementById("direccionForm").value = direccion;
    document.getElementById("vendedorForm").value = vendedor;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function verEnMaps(direccion){
    let url = `https://www.google.com/maps/search/${encodeURIComponent(direccion + ', Ciudad Autónoma de Buenos Aires')}`;
    window.open(url, "_blank");
}

// Modal Carrusel
function abrirModal(index){
    currentFotos = departamentos[index].Fotos ? departamentos[index].Fotos.split(",").map(f=>f.trim()).map(link=>{
        let id = link.match(/[-\w]{25,}/);
        return id ? "https://lh3.googleusercontent.com/d/"+id[0] : null;
    }).filter(Boolean) : [];
    if(currentFotos.length===0) return;
    currentIndex = 0;
    document.getElementById("modalImg").src = currentFotos[currentIndex];
    document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

function cambiarFoto(delta){
    if(!currentFotos.length) return;
    currentIndex = (currentIndex + delta + currentFotos.length) % currentFotos.length;
    document.getElementById("modalImg").src = currentFotos[currentIndex];
}

// WhatsApp con nombre
document.getElementById("consultaForm").addEventListener("submit", function(e){
    e.preventDefault();
    const nombre = document.getElementById("nombreForm").value;
    const direccion = document.getElementById("direccionForm").value;
    let vendedor = document.getElementById("vendedorForm").value;
    if(!vendedor) { alert("No hay vendedor asignado"); return; }
    if(vendedor[0] !== '+') vendedor = '+' + vendedor;
    const fecha = document.getElementById("fechaForm").value;
    const tiempo = document.getElementById("tiempoForm").value;
    const personas = document.getElementById("personasForm").value;
    const mascotas = document.getElementById("mascotasForm").value;

    let mensaje = `Hola! Mi nombre es ${nombre}.\nEstoy interesado en el departamento "${direccion}".\nFecha de ingreso: ${fecha}\nTiempo de alquiler: ${tiempo} meses\nPersonas: ${personas}\nMascotas: ${mascotas}`;
    window.open(`https://wa.me/${vendedor.replace(/\D/g,'')}?text=${encodeURIComponent(mensaje)}`, "_blank");
});
</script>
</body>
</html>
