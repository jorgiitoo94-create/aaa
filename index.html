<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Departamentos</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
    font-family: 'Arial', sans-serif;
    background:#0f172a;
    color:white;
}

body {
    padding:20px;
    text-align:center;
}

/* Titulos */
h1,h2{
    text-align:center;
    margin:15px 0;
    font-weight:bold;
}
h1{
    font-size:2.8em;
    letter-spacing:1px;
    color:#e0e0e0;
}
h2{
    font-size:2.2em;
    color:#cbd5e1;
}

/* Filtro */
#filtroAmbientes{
    width:95%;
    max-width:800px;
    padding:14px 20px;
    margin:20px auto;
    display:block;
    border-radius:25px;
    border:none;
    background:#1e293b;
    color:white;
    font-size:1.4em;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
}

/* Tarjetas de departamentos */
.list-item{
    display:flex;
    flex-direction:row;
    background:linear-gradient(145deg,#1e293b,#1b263a);
    border-radius:25px;
    padding:20px;
    margin-bottom:25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    max-width:800px;
    width:95%;
    align-items:center;
    justify-content:center;
    margin-left:auto;
    margin-right:auto;
    transition: transform 0.3s, box-shadow 0.3s;
}
.list-item:hover{
    transform: translateY(-4px);
    box-shadow: 0 14px 30px rgba(0,0,0,0.6);
}

.list-item img{
    width:180px;
    height:140px;
    object-fit:cover;
    border-radius:20px;
    cursor:pointer;
    flex-shrink:0;
    transition: transform 0.3s;
}
.list-item img:hover{
    transform: scale(1.05);
}

/* Ajuste info de la tarjeta */
.list-item .info{
    flex:1;
    margin-left:25px;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
}

.list-item .info h3{
    margin:0 0 5px 0;
    font-size:1.8em;
    color:#f0f0f0;
}

.list-item .info .ambientes{
    display:inline-block;
    background:#6366f1;
    color:white;
    padding:4px 12px;
    border-radius:12px;
    font-weight:bold;
    font-size:1.2em;
    margin-left:6px;
}

.list-item .info .barrio{
    font-size:1.5em;
    font-weight:bold;
    font-family: 'Georgia', serif;
    text-transform:uppercase;
    margin:6px 0 8px 0;
    color:#a5b4fc;
    text-align:left;
    width:100%;
}

.list-item .info .detalles{
    font-size:1.3em;
    margin:8px 0;
    text-align:center;
    color:#e0e0e0;
}
.list-item .info .incluye{
    font-style:italic;
    color:#d1d5db;
}

.btn-row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}
.btn{
    padding:12px 18px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-weight:bold;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:1.2em;
    transition:0.3s;
}
.btn-whatsapp{
    background: linear-gradient(90deg,#25D366,#1ebe57);
    color:white;
}
.btn-whatsapp:hover{
    transform: scale(1.05);
}
.btn-maps{
    background: linear-gradient(90deg,#3b82f6,#2563eb);
    color:white;
}
.btn-maps:hover{
    transform: scale(1.05);
}
.btn-fotos{
    background: linear-gradient(90deg,#f59e0b,#d97706);
    color:white;
}
.btn-fotos:hover{
    transform: scale(1.05);
}
.btn-consulta{
    background: linear-gradient(90deg,#6366f1,#4f46e5);
    color:white;
}
.btn-consulta:hover{
    transform: scale(1.05);
}

/* Formulario */
form{
    margin-top:40px;
    background:linear-gradient(145deg,#1e293b,#1b263a);
    padding:40px 30px; /* más padding para que inputs no toquen bordes */
    border-radius:25px;
    width:95%;
    max-width:800px; /* mismo ancho que las tarjetas */
    box-sizing:border-box;
    text-align:center;
    margin-left:auto;
    margin-right:auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}
form label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    font-size:1.5em;
    color:#cbd5e1;
}
form input, form select{
    width:100%;
    padding:16px 18px;
    margin-bottom:18px;
    border-radius:14px;
    border:none;
    font-size:1.4em;
    text-align:center;
    background:#1f2937;
    color:white;
    box-sizing:border-box;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
}

/* Modal Carrusel scrolleable */
.modal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:1000;
    overflow:hidden;
}
.modal .carrusel{
    display:flex;
    overflow-x:auto;
    scroll-snap-type: x mandatory;
    width:90%;
    max-width:1000px;
    height:80%;
    margin:auto;
}
.modal .carrusel img{
    flex:0 0 auto;
    width:100%;
    max-width:600px;
    height:auto;
    object-fit:contain;
    scroll-snap-align: start;
    border-radius:12px;
    margin-right:20px;
}

/* Responsive */
@media(max-width:600px){
    .list-item{
        flex-direction:column;
        padding:15px;
    }
    .list-item img{
        width:120px;
        height:120px;
        margin-bottom:10px;
    }
    .list-item .info h3,.list-item .info .barrio,.list-item .info .detalles,.list-item .info .ambientes,.list-item .info .incluye{
        font-size:1.3em;
    }
    form label, form input, form select{
        font-size:1.4em;
    }
    .btn{font-size:1.2em;padding:12px 16px;}
}
</style>
</head>
<body>

<h1>Departamentos</h1>
<label>Filtrar por ambientes:</label>
<select id="filtroAmbientes">
    <option value="">Todos</option>
</select>

<div id="contenedor"></div>

<h2>Formulario de Consulta</h2>
<form id="consultaForm">
    <input type="hidden" id="direccionForm">
    <input type="hidden" id="vendedorForm">

    <label>Nombre:</label>
    <input type="text" id="nombreForm" placeholder="Tu nombre" required>

    <label>Fecha de ingreso:</label>
    <input type="date" id="fechaForm" required>

    <label>Tiempo a alquilar (meses):</label>
    <input type="number" id="tiempoForm" min="1" required>

    <label>Cantidad de personas:</label>
    <input type="number" id="personasForm" min="1" required>

    <label>¿Tienen mascotas?</label>
    <select id="mascotasForm" required>
        <option value="No">No</option>
        <option value="Sí">Sí</option>
    </select>

    <button type="submit" class="btn btn-whatsapp">💬 Enviar WhatsApp</button>
</form>

<!-- Modal Carrusel -->
<div id="modal" class="modal" onclick="cerrarModal()">
    <div class="carrusel" onclick="event.stopPropagation()">
        <!-- Imágenes se insertan desde JS -->
    </div>
</div>

<script>
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv";
let departamentos = [];
let currentFotos = [];

Papa.parse(csvURL,{
    download:true,
    header:true,
    complete:function(results){
        departamentos = results.data.filter(row => row["Dirección"]);
        llenarFiltro();
        mostrarDepartamentos(departamentos);
    }
});

function llenarFiltro(){
    const select = document.getElementById("filtroAmbientes");
    let ambientesSet = new Set(departamentos.map(d=>d["Ambientes"]).filter(Boolean));
    ambientesSet.forEach(a=>{
        let option = document.createElement("option");
        option.value = a;
        option.textContent = a + " amb";
        select.appendChild(option);
    });
    select.addEventListener("change",()=>{
        let filtrados = departamentos.filter(d => !select.value || d["Ambientes"] === select.value);
        mostrarDepartamentos(filtrados);
    });
}

function mostrarDepartamentos(lista){
    const contenedor=document.getElementById("contenedor");
    contenedor.innerHTML="";
    lista.forEach((row,index)=>{
        let fotosLinks = [];
        if(row["Fotos"]){
            fotosLinks = row["Fotos"].split(",").map(f=>f.trim()).map(link=>{
                let id = link.match(/[-\w]{25,}/);
                return id ? "https://lh3.googleusercontent.com/d/"+id[0] : null;
            }).filter(Boolean);
        }
        let primera = fotosLinks[0] || "";

        let item = document.createElement("div");
        item.className="list-item";
        item.innerHTML=`
            <img src="${primera}" onclick="abrirModal(${index})">
            <div class="info">
                <h3>${row["Dirección"]} - <span class="ambientes">${row["Ambientes"]} amb</span></h3>
                <p class="barrio">${row["Barrio"] || ""}</p>
                <div class="detalles">Valor: ${row["Valor"] || "-"} | <span class="incluye">Incluye: ${row["Incluye"] || "-"}</span></div>
                <div class="btn-row">
                    <button class="btn btn-fotos" onclick="abrirModal(${index})">📸 Ver Fotos</button>
                    <button class="btn btn-consulta" onclick="seleccionarDepartamento('${row['Dirección']}','${row['Vendedor']}')">💼 Consulta</button>
                    <button class="btn btn-maps" onclick="verEnMaps('${row['Dirección']}')">🗺️ Maps</button>
                </div>
            </div>
        `;
        item.fotos = fotosLinks;
        contenedor.appendChild(item);
    });
}

function seleccionarDepartamento(direccion, vendedor){
    document.getElementById("direccionForm").value = direccion;
    document.getElementById("vendedorForm").value = vendedor;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function verEnMaps(direccion){
    let url = `https://www.google.com/maps/search/${encodeURIComponent(direccion + ', Ciudad Autónoma de Buenos Aires')}`;
    window.open(url, "_blank");
}

function abrirModal(index){
    const modal = document.getElementById("modal");
    const carrusel = modal.querySelector(".carrusel");
    carrusel.innerHTML = "";
    currentFotos = departamentos[index].Fotos ? departamentos[index].Fotos.split(",").map(f=>f.trim()).map(link=>{
        let id = link.match(/[-\w]{25,}/);
        return id ? "https://lh3.googleusercontent.com/d/"+id[0] : null;
    }).filter(Boolean) : [];
    if(currentFotos.length===0) return;
    currentFotos.forEach(f=>{
        let img = document.createElement("img");
        img.src = f;
        carrusel.appendChild(img);
    });
    modal.style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

document.getElementById("consultaForm").addEventListener("submit", function(e){
    e.preventDefault();
    const nombre = document.getElementById("nombreForm").value;
    const direccion = document.getElementById("direccionForm").value;
    let vendedor = document.getElementById("vendedorForm").value;
    if(!vendedor) { alert("No hay vendedor asignado"); return; }
    if(vendedor[0] !== '+') vendedor = '+' + vendedor;
    const fecha = document.getElementById("fechaForm").value;
    const tiempo = document.getElementById("tiempoForm").value;
    const personas = document.getElementById("personasForm").value;
    const mascotas = document.getElementById("mascotasForm").value;

    let mensaje = `Hola! Mi nombre es ${nombre}.\nEstoy interesado en el departamento "${direccion}".\nFecha de ingreso: ${fecha}\nTiempo de alquiler: ${tiempo} meses\nPersonas: ${personas}\nMascotas: ${mascotas}`;
    window.open(`https://wa.me/${vendedor.replace(/\D/g,'')}?text=${encodeURIComponent(mensaje)}`, "_blank");
});
</script>
</body>
</html>
