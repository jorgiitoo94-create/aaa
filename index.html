<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Departamentos Temporarios</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:20px 0;
text-align:center;
overflow-x:hidden;
}

h1{
font-size:2.3em;
margin-bottom:5px;
}

.subtitulo{
font-size:1.2em;
color:#94a3b8;
margin-bottom:20px;
}

.container{
width:92vw;
margin:auto;
}

/* FILTROS */

.sectionTitle{
margin-top:25px;
margin-bottom:10px;
font-size:1.3em;
color:#cbd5e1;
}

.btnFiltro{
width:100%;
padding:16px;
margin:6px 0;
font-size:1.3em;
border:none;
border-radius:18px;
background:#6366f1;
color:white;
cursor:pointer;
}

.btnFiltro.activo{
background:#16a34a;
}

select{
width:100%;
padding:16px;
border-radius:18px;
font-size:1.2em;
background:#1e293b;
color:white;
border:none;
}

/* TARJETAS */

.list-item{
display:flex;
gap:15px;
background:linear-gradient(145deg,#1e293b,#1b263a);
border-radius:25px;
padding:20px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
min-height:420px;
}

.list-item img{
width:420px;
min-width:420px;
border-radius:15px;
object-fit:cover;
cursor:pointer;
transition:.3s;
}

.list-item img:hover{
transform:scale(1.02);
}

.info{
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between;
text-align:left;
}

.barrio{
font-size:3em;
font-weight:bold;
color:#3b82f6;
}

.ambientes{
font-size:2.4em;
color:#94a3b8;
margin-top:6px;
}

.direccion{
font-size:2.4em;
margin-top:6px;
}

.valor{
font-size:2.6em;
font-weight:bold;
color:#facc15;
margin-top:10px;
}

.incluye{
font-size:2em;
color:#cbd5e1;
margin-top:6px;
}

.mascotas{
font-size:1.6em;
margin-top:10px;
}

/* BOTONES */

.btnRow{
display:flex;
gap:8px;
margin-top:10px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-size:2em;
cursor:pointer;
color:white;
}

.btnFoto{background:#f59e0b;}
.btnMapa{background:#2563eb;}
.btnWsp{background:#25D366;}

.btnLabels{
display:flex;
gap:8px;
margin-top:4px;
font-size:1em;
color:#94a3b8;
text-align:center;
}
.btnLabels div{
flex:1;
}

/* NUEVO BOTON CONSULTA */

.btnConsulta{
width:100%;
margin-top:12px;
padding:16px;
font-size:2em;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
cursor:pointer;
font-weight:bold;
}

.btnConsulta:hover{
background:#16a34a;
}

/* CARRUSEL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
flex-direction:column;
}

.modal img{
max-width:90%;
max-height:70%;
border-radius:15px;
}

.closeBtn{
position:absolute;
top:20px;
right:30px;
font-size:3em;
background:red;
border:none;
color:white;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}

.navBtn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:3em;
background:rgba(255,255,255,0.2);
border:none;
color:white;
padding:10px 20px;
cursor:pointer;
}

.prev{ left:20px; }
.next{ right:20px; }

</style>
</head>

<body>

<h1>Departamentos Temporarios</h1>
<div class="subtitulo">@alquilar.temporario es facil seguro y moderno</div>

<div class="container">

<div class="sectionTitle">Ambientes</div>
<div id="ambientes"></div>

<button class="btnFiltro" id="filtroPerro">🐶 Apto perro</button>
<button class="btnFiltro" id="filtroGato">🐱 Apto gato</button>

<div class="sectionTitle">Barrio</div>
<select id="barrioSelect">
<option value="">Todos</option>
</select>

<div id="lista"></div>

</div>

<div class="modal" id="modal">
<button class="closeBtn" onclick="cerrarModal()">✖</button>
<button class="navBtn prev" onclick="cambiar(-1)">‹</button>
<img id="modalImg">
<button class="navBtn next" onclick="cambiar(1)">›</button>
</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv"

let departamentos=[]
let ambienteActivo=null
let filtroPerro=false
let filtroGato=false

let fotosActuales=[]
let indexFoto=0

Papa.parse(csvURL,{
download:true,
header:true,
complete:function(results){
departamentos=results.data.filter(r=>r["Dirección"])
crearFiltros()
filtrar()
}
})

function crearFiltros(){
let amb=[...new Set(departamentos.map(d=>parseInt(d["Ambientes"])))]
amb.sort((a,b)=>a-b)
amb.forEach(a=>{
let b=document.createElement("button")
b.className="btnFiltro"
b.innerText=a+" ambientes"
b.onclick=()=>{
ambienteActivo=ambienteActivo==a?null:a
document.querySelectorAll("#ambientes .btnFiltro").forEach(btn=>btn.classList.remove("activo"))
if(ambienteActivo){ b.classList.add("activo") }
actualizarBarrios()
filtrar()
}
document.getElementById("ambientes").appendChild(b)
})
actualizarBarrios()
}

document.getElementById("filtroPerro").onclick=()=>{
filtroPerro=!filtroPerro
document.getElementById("filtroPerro").classList.toggle("activo")
filtrar()
}

document.getElementById("filtroGato").onclick=()=>{
filtroGato=!filtroGato
document.getElementById("filtroGato").classList.toggle("activo")
filtrar()
}

function actualizarBarrios(){
let select=document.getElementById("barrioSelect")
select.innerHTML='<option value="">Todos</option>'
let filtrados=departamentos.filter(d=>!ambienteActivo || parseInt(d["Ambientes"])==ambienteActivo)
let barrios=[...new Set(filtrados.map(d=>d["barrio"]))]
barrios.sort()
barrios.forEach(b=>{
let op=document.createElement("option")
op.value=b
op.textContent=b
select.appendChild(op)
})
select.onchange=filtrar
}

function filtrar(){

let barrio=document.getElementById("barrioSelect").value
let lista=document.getElementById("lista")
lista.innerHTML=""

let resultados=departamentos
.filter(d=>(!ambienteActivo || parseInt(d["Ambientes"])==ambienteActivo))
.filter(d=>(!barrio || d["barrio"]==barrio))
.filter(d=>(!filtroPerro || (d["perro?"]||"").toLowerCase()=="si"))
.filter(d=>(!filtroGato || (d["gato?"]||"").toLowerCase()=="si"))

resultados.forEach(row=>{

let fotos=row["Fotos"].split(",").map(f=>{
let id=f.match(/[-\w]{25,}/)
return "https://lh3.googleusercontent.com/d/"+id[0]
})

let perro = (row["perro?"]||"").toLowerCase()=="si"
let gato = (row["gato?"]||"").toLowerCase()=="si"

let card=document.createElement("div")
card.className="list-item"

let basePath=window.location.pathname.replace("index.html","")
let fullLink=window.location.origin + basePath + "detalle.html?dir="+encodeURIComponent(row["Dirección"])

card.innerHTML=`

<img src="${fotos[0]}" class="imgPrincipal">

<div class="info">

<div class="barrio">${row["barrio"]}</div>
<div class="ambientes">${row["Ambientes"]} ambientes</div>
<div class="direccion">${row["Dirección"]}</div>
<div class="valor">${row["Valor:"]}</div>
<div class="incluye">Incluye: ${row["Incluye"] || ""}</div>

<div class="mascotas">
🐶 ${perro ? "✅" : "❌"} &nbsp;&nbsp; 🐱 ${gato ? "✅" : "❌"}
</div>

<div class="btnRow">
<button class="btn btnFoto">📸</button>
<button class="btn btnMapa">🗺️</button>
<button class="btn btnCompartir">📤</button>
</div>

<div class="btnLabels">
<div>Fotos</div>
<div>Mapa</div>
<div>Compartir</div>
</div>

<button class="btn btnConsulta">💬 Info + consulta</button>

</div>
`

card.querySelector(".btnFoto").onclick=()=>abrirModal(fotos)
card.querySelector(".imgPrincipal").onclick=()=>abrirModal(fotos)

card.querySelector(".btnMapa").onclick=()=>verMapa(row["Dirección"])

card.querySelector(".btnConsulta").onclick=()=>{
window.open(fullLink)
}

card.querySelector(".btnCompartir").onclick=()=>{
window.open("https://wa.me/?text="+encodeURIComponent("Mirá este departamento: "+fullLink))
}

lista.appendChild(card)

})

}

function abrirModal(fotos){
fotosActuales=fotos
indexFoto=0
document.getElementById("modal").style.display="flex"
mostrar()
}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

function cambiar(dir){
indexFoto+=dir
if(indexFoto<0) indexFoto=fotosActuales.length-1
if(indexFoto>=fotosActuales.length) indexFoto=0
mostrar()
}

function mostrar(){
document.getElementById("modalImg").src=fotosActuales[indexFoto]
}

function verMapa(dir){
window.open("https://www.google.com/maps/search/"+encodeURIComponent(dir+", CABA"))
}

</script>

</body>
</html>
