<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alquilar Temporario</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
    font-family: 'Arial', sans-serif;
    background:#0f172a;
    color:white;
}
body { padding:20px; text-align:center; }

/* Titulos */
h1,h2{
    text-align:center;
    margin:10px 0;
    font-weight:bold;
    line-height:1.2em;
}
h1{ font-size:3.2em; color:#e0e0e0; }
h2{ font-size:3.2em; color:#cbd5e1; }

/* Filtro ancho completo */
.filtro-container{
    width:100%;
    max-width:none;
    margin:0 auto 40px auto;
    text-align:center;
}
.filtro-container label{
    font-size:3em;
    display:block;
    margin-bottom:10px;
}
#filtroAmbientes{
    width:100%;
    padding:22px 20px;
    border-radius:25px;
    border:none;
    background:#1e293b;
    color:white;
    font-size:3em; 
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
    box-sizing:border-box;
}

/* Tarjetas de departamentos */
.list-item{
    display:flex;
    flex-direction:row;
    background:linear-gradient(145deg,#1e293b,#1b263a);
    border-radius:25px;
    padding:20px;
    margin-bottom:25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    max-width:calc(100% - 40px);
    align-items:center;
    justify-content:flex-start;
    margin-left:auto;
    margin-right:auto;
    transition: transform 0.3s, box-shadow 0.3s, border 0.3s;
    cursor:default;
}
.list-item.selected{
    border:3px solid #6366f1;
    box-shadow:0 14px 30px rgba(99,102,241,0.7);
}
.list-item:hover{ transform: translateY(-4px); }

.list-item img{
    width:220px;
    height:auto;
    max-height:280px;
    object-fit:cover;
    border-radius:20px;
    cursor:pointer;
    flex-shrink:0;
    transition: transform 0.3s;
}
.list-item img:hover{ transform: scale(1.05); }

.list-item .info{
    flex:1;
    margin-left:25px;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
}
.list-item .info h3{
    margin:0 0 5px 0;
    font-size:2em;
    color:#ffffff;
}
.list-item .info .ambientes{
    display:inline-block;
    background:#6366f1;
    color:white;
    padding:4px 12px;
    border-radius:12px;
    font-weight:bold;
    font-size:1.2em;
    margin-left:6px;
}
.list-item .info .barrio{
    font-size:4.4em; /* el doble que antes */
    font-weight:bold;
    font-family: 'Georgia', serif;
    text-transform:uppercase;
    margin:6px 0 8px 0;
    color:#3b82f6; /* azul sólido */
    text-align:left;
    width:100%;
}

/* Detalles del depto */
.list-item .info .detalles{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:1.3em;
    margin:8px 0;
    color:#e0e0e0;
}
.list-item .info .detalles .valor{
    font-size:2.2em; /* destacado grande */
    font-weight:bold;
    color:#facc15; /* amarillo */
}
.list-item .info .detalles .incluye{
    font-style:italic;
    color:#d1d5db;
    font-size:1.4em;
    text-align:right;
}

.btn-row{
    display:flex;
    justify-content:flex-start;
    gap:20px;
    flex-wrap:wrap;
    margin-top:15px;
}
.btn{
    padding:24px 36px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-weight:bold;
    display:inline-flex;
    align-items:center;
    gap:12px;
    font-size:2.4em;
    transition:0.3s;
}
.btn-whatsapp{ background: linear-gradient(90deg,#25D366,#1ebe57); color:white; }
.btn-maps{ background: linear-gradient(90deg,#3b82f6,#2563eb); color:white; }
.btn-fotos{ background: linear-gradient(90deg,#f59e0b,#d97706); color:white; }
.btn-consulta{ background: linear-gradient(90deg,#6366f1,#4f46e5); color:white; }

/* Formulario */
form, #requisitos{
    margin-top:40px;
    background:linear-gradient(145deg,#1e293b,#1b263a);
    padding:60px 40px;
    border-radius:25px;
    width:95%;
    max-width:95vw;
    box-sizing:border-box;
    text-align:center;
    margin-left:auto;
    margin-right:auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    font-size:3em;
    transition: box-shadow 0.5s;
}
form.highlight{ box-shadow: 0 0 30px 6px #6366f1; }

form label{
    display:block;
    margin-bottom:12px;
    font-weight:bold;
    color:#cbd5e1;
}
form input, form select{
    width:100%;
    padding:20px 22px;
    margin-bottom:24px;
    border-radius:16px;
    border:none;
    font-size:1em;
    text-align:center;
    background:#1f2937;
    color:white;
    box-sizing:border-box;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
}
#requisitos{ display:none; text-align:left; font-size:1.6em; color:#f0f0f0; }
#requisitos ul{ margin-left:25px; }
#requisitos button{ margin-top:20px; font-size:1.2em; }

/* Mensaje bajo formulario */
#mensajeSeleccion{
    font-size:1.5em;
    color:#a5b4fc;
    margin-top:20px;
}

/* Modal Carrusel scrolleable */
.modal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:1000;
    overflow:hidden;
    flex-direction:column;
}
.modal .carrusel{
    display:flex;
    overflow-x:auto;
    scroll-snap-type: x mandatory;
    width:90%;
    max-width:1000px;
    height:80%;
    margin:auto;
    scroll-behavior: smooth;
}
.modal .carrusel img{
    flex:0 0 auto;
    width:auto;
    height:100%;
    object-fit:contain;
    scroll-snap-align: start;
    border-radius:12px;
    margin-right:20px;
}
.modal .close-btn{
    background:#f87171;
    color:white;
    font-size:2em;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-top:10px;
}

/* Responsive */
@media(max-width:600px){
    h1,h2{ font-size:2.2em; }
    .list-item img{ width:120px; height:120px; margin-bottom:10px; }
    .list-item .info h3,.list-item .info .barrio,.list-item .info .detalles,.list-item .info .ambientes,.list-item .info .incluye{
        font-size:1.5em;
    }
    form, #requisitos{ padding:40px 20px; font-size:2.2em; }
    #filtroAmbientes{ font-size:2.2em; padding:16px; }
    .btn{font-size:1.2em;padding:12px 16px;}
}
</style>
</head>
<body>

<h1>Alquilar temporario<br>Departamentos amoblados</h1>

<div class="filtro-container">
    <label for="filtroAmbientes">Filtrar por ambientes:</label>
    <select id="filtroAmbientes">
        <option value="">Todos</option>
    </select>
</div>

<div id="contenedor"></div>

<div id="requisitos">
    <h2>Requisitos</h2>
    <ul>
        <li>DNI o pasaporte</li>
        <li>Demostración de ingresos mensuales</li>
        <li>Mes de adelanto, mes de depósito, mes de honorarios</li>
        <li>Contrato de 3 a 12 meses según cada caso</li>
    </ul>
    <button onclick="aceptarRequisitos()">✅ Acepto los requisitos</button>
</div>

<h2>Formulario de Consulta</h2>
<form id="consultaForm" style="display:none;">
    <input type="hidden" id="direccionForm">
    <input type="hidden" id="vendedorForm">

    <label>Nombre:</label>
    <input type="text" id="nombreForm" placeholder="Tu nombre" required>

    <label>Fecha de ingreso:</label>
    <input type="date" id="fechaForm" required>

    <label>Tiempo a alquilar (meses):</label>
    <input type="number" id="tiempoForm" min="1" required>

    <label>Cantidad de personas:</label>
    <input type="number" id="personasForm" min="1" required>

    <label>¿Tienen mascotas?</label>
    <select id="mascotasForm" required>
        <option value="No">No</option>
        <option value="Sí">Sí</option>
    </select>

    <button type="submit" class="btn btn-whatsapp">💬 Enviar WhatsApp</button>
</form>

<div id="mensajeSeleccion">Seleccionar depto con el botón Consulta</div>

<div id="modal" class="modal">
    <div class="carrusel" onclick="event.stopPropagation()"></div>
    <button class="close-btn" onclick="cerrarModal()">❌ Cerrar</button>
</div>

<script>
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv";
let departamentos = [];
let departamentoSeleccionado = null;
let currentFotos = [];

Papa.parse(csvURL,{
    download:true,
    header:true,
    complete:function(results){
        departamentos = results.data.filter(row => row["Dirección"]);
        llenarFiltro();
        mostrarDepartamentos(departamentos);
    }
});

function llenarFiltro(){
    const select = document.getElementById("filtroAmbientes");
    let ambientesSet = new Set(departamentos.map(d=>d["Ambientes"]).filter(Boolean));
    ambientesSet.forEach(a=>{
        let option = document.createElement("option");
        option.value = a;
        option.textContent = a + " amb";
        select.appendChild(option);
    });
    select.addEventListener("change",()=>{
        let filtrados = departamentos.filter(d => !select.value || d["Ambientes"] === select.value);
        mostrarDepartamentos(filtrados);
    });
}

function mostrarDepartamentos(lista){
    const contenedor=document.getElementById("contenedor");
    contenedor.innerHTML="";
    lista.forEach((row,index)=>{
        let fotosLinks = [];
        if(row["Fotos"]){
            fotosLinks = row["Fotos"].split(",").map(f=>f.trim()).map(link=>{
                let id = link.match(/[-\w]{25,}/);
                return id ? "https://lh3.googleusercontent.com/d/"+id[0] : null;
            }).filter(Boolean);
        }
        let primera = fotosLinks[0] || "";

        let item = document.createElement("div");
        item.className="list-item";
        if(departamentoSeleccionado===row["Dirección"]) item.classList.add("selected");
        item.innerHTML=`
            <img src="${primera}" onclick="abrirModal(${index})">
            <div class="info">
                <h3>${row["Dirección"]} - <span class="ambientes">${row["Ambientes"]} amb</span></h3>
                <p class="barrio">${row["Barrio"] || ""}</p>
                <div class="detalles">
                    <span class="valor">Valor: ${row["Valor"] || "-"}</span>
                    <span class="incluye">Incluye: ${row["Incluye"] || "-"}</span>
                </div>
                <div class="btn-row">
                    <button class="btn btn-fotos" onclick="abrirModal(${index})">📸 Ver Fotos</button>
                    <button class="btn btn-consulta" onclick="seleccionarDepartamento('${row['Dirección']}','${row['Vendedor']}',this)">💼 Consulta</button>
                    <button class="btn btn-maps" onclick="verEnMaps('${row['Dirección']}')">🗺️ Maps</button>
                </div>
            </div>
        `;
        item.fotos = fotosLinks;
        contenedor.appendChild(item);
    });
}

function seleccionarDepartamento(direccion,vendedor,btn){
    const mensajeSeleccion = document.getElementById("mensajeSeleccion");

    if(departamentoSeleccionado === direccion){
        departamentoSeleccionado = null;
        btn.closest(".list-item").classList.remove("selected");
        document.getElementById("requisitos").style.display = "none";
        document.getElementById("consultaForm").style.display = "none";
        mensajeSeleccion.style.display = "block";
        return;
    }
    departamentoSeleccionado = direccion;

    document.querySelectorAll(".list-item").forEach(item => item.classList.remove("selected"));
    btn.closest(".list-item").classList.add("selected");

    document.getElementById("direccionForm").value = direccion;
    document.getElementById("vendedorForm").value = '+5491168686694';

    document.getElementById("requisitos").style.display = "block";
    document.getElementById("requisitos").scrollIntoView({behavior:"smooth"});
    document.getElementById("consultaForm").style.display = "none";

    mensajeSeleccion.style.display = "none";
}

function aceptarRequisitos(){
    document.getElementById("consultaForm").style.display = "block";
    document.getElementById("consultaForm").scrollIntoView({behavior:"smooth"});
}

function verEnMaps(direccion){
    let url = `https://www.google.com/maps/search/${encodeURIComponent(direccion + ', Ciudad Autónoma de Buenos Aires')}`;
    window.open(url, "_blank");
}

function abrirModal(index){
    const modal = document.getElementById("modal");
    const carrusel = modal.querySelector(".carrusel");
    carrusel.innerHTML = "";
    currentFotos = departamentos[index].Fotos ? departamentos[index].Fotos.split(",").map(f=>f.trim()).map(link=>{
        let id = link.match(/[-\w]{25,}/);
        return id ? "https://lh3.googleusercontent.com/d/"+id[0] : null;
    }).filter(Boolean) : [];
    if(currentFotos.length===0) return;
    currentFotos.forEach(f=>{
        let img = document.createElement("img");
        img.src = f;
        carrusel.appendChild(img);
    });
    modal.style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

document.getElementById("consultaForm").addEventListener("submit", function(e){
    e.preventDefault();
    const nombre = document.getElementById("nombreForm").value;
    const direccion = document.getElementById("direccionForm").value;
    const vendedor = document.getElementById("vendedorForm").value;
    const fecha = document.getElementById("fechaForm").value;
    const tiempo = document.getElementById("tiempoForm").value;
    const personas = document.getElementById("personasForm").value;
    const mascotas = document.getElementById("mascotasForm").value;

    let mensaje = `Hola! Mi nombre es ${nombre}.\nEstoy interesado en el departamento "${direccion}".\nFecha de ingreso: ${fecha}\nTiempo de alquiler: ${tiempo} meses\nPersonas: ${personas}\nMascotas: ${mascotas}`;
    window.open(`https://wa.me/${vendedor.replace(/\D/g,'')}?text=${encodeURIComponent(mensaje)}`, "_blank");
});
</script>
</body>
</html>
