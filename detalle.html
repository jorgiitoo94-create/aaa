<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Departamento</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.container{max-width:900px;margin:auto;padding-bottom:160px;}

.hero{text-align:center;padding:40px;}

.barrioGrande{
font-size:4em;
font-weight:bold;
color:#38bdf8;
}

.galeria{display:flex;overflow-x:auto;gap:12px;padding:20px;}
.galeria img{height:400px;border-radius:12px;cursor:pointer;}

.box{
background:#1e293b;
padding:25px;
border-radius:14px;
margin:12px;
font-size:1.6em;
}

.story{
text-align:center;
font-size:2em;
padding:20px;
}

.pasos{
font-size:2.8em;
text-align:center;
padding:30px;
}

.cta{
position:fixed;
bottom:0;
width:100%;
background:#25D366;
text-align:center;
padding:40px;
font-size:2.2em;
cursor:pointer;
font-weight:bold;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#1e293b;
padding:50px;
border-radius:16px;
width:95%;
max-width:700px;
position:relative;
text-align:center;
font-size:1.6em;
}

.closeBtn{
position:absolute;
top:15px;
right:20px;
font-size:2em;
color:red;
cursor:pointer;
}

input, select{
width:95%;
padding:20px;
margin-top:20px;
border-radius:10px;
border:none;
font-size:1.2em;
}

button{
margin-top:25px;
padding:20px 30px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:1.2em;
}

.btnWhite{background:white;color:black;}
.btnGreen{background:#22c55e;color:white;}

.backBtn{background:#334155;color:white;margin-right:10px;}

.carousel{
display:flex;
overflow-x:auto;
gap:15px;
}

.carousel img{
height:80vh;
border-radius:12px;
}

.mapa{
margin:20px;
border-radius:14px;
overflow:hidden;
height:400px;
}

details{
margin:12px;
font-size:1.4em;
background:#1e293b;
padding:20px;
border-radius:14px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<div id="barrio" class="barrioGrande"></div>
</div>

<div class="story">
Si buscas mudarte de forma simple este departamento es ideal para vos
</div>

<div class="galeria" id="galeria"></div>

<div class="box">
<b>📍 Dirección:</b><br>
<div id="direccion"></div>
</div>

<details>
<summary><b>Ver descripción</b></summary>
<div id="descripcion"></div>
</details>

<div class="box">
<b>Valor:</b><br>
<div id="precio"></div>
</div>

<div class="box">
<b>Incluye:</b><br>
<div id="incluye"></div>
</div>

<div class="box">
<b>Total a abonar el día de ingreso:</b><br>
<div id="total"></div>
</div>

<div class="mapa">
<iframe id="mapaFrame" width="100%" height="100%" style="border:0;" loading="lazy"></iframe>
</div>

<div class="pasos">
<b>Mudarte es fácil:</b><br><br>
Realizá tu consulta<br>
Hablá con un asesor<br>
Coordiná tu visita o reserva
</div>

</div>

<div class="cta" onclick="iniciarProceso()">
💬 CONSULTAR POR WHATSAPP
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent" id="modalContent"></div>
</div>

<!-- VISOR -->
<div class="modal" id="visor">
<div class="carousel" id="carousel"></div>
<span class="closeBtn" onclick="cerrarVisor()">✖</span>
</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv"

let depto=null
let fotosGlobal=[]
let formData={}
let historial=[]

const params=new URLSearchParams(window.location.search)
const index=params.get("i")

Papa.parse(csvURL,{
download:true,
header:true,
complete:function(results){
let data=results.data.filter(r=>r["Dirección"])
depto=data[index]
cargar()
}
})

function cargar(){

let fotos=depto["Fotos"].split(",").map(f=>{
let id=f.match(/[-\w]{25,}/)
return "https://lh3.googleusercontent.com/d/"+id[0]
})

fotosGlobal=fotos

document.getElementById("barrio").innerText=depto["Barrio"]
document.getElementById("direccion").innerText=depto["Dirección"]
document.getElementById("descripcion").innerText=depto["Descripción"]
document.getElementById("precio").innerText=depto["Valor"]+" USD / mes"
document.getElementById("incluye").innerText=depto["Incluye"]

let valor=parseFloat(depto["Valor"])
let total=valor*3

document.getElementById("total").innerHTML=`
Mes adelantado: USD ${valor}<br>
Depósito: USD ${valor}<br>
Honorarios: USD ${valor}<br><br>
<b>Total: USD ${total}</b>
`

// MAPA
document.getElementById("mapaFrame").src=
`https://www.google.com/maps?q=${encodeURIComponent(depto["Dirección"])}&output=embed`

let g=document.getElementById("galeria")
g.innerHTML=""

fotos.forEach((f,i)=>{
let img=document.createElement("img")
img.src=f
img.onclick=()=>abrirVisor(i)
g.appendChild(img)
})

}

function abrirVisor(index){
let c=document.getElementById("carousel")
c.innerHTML=""

fotosGlobal.forEach(f=>{
let img=document.createElement("img")
img.src=f
c.appendChild(img)
})

document.getElementById("visor").style.display="flex"
c.scrollLeft=index * window.innerWidth
}

function cerrarVisor(){
document.getElementById("visor").style.display="none"
}

// ===== FLUJO =====

function iniciarProceso(){
historial=[]
mostrarRequisitos()
}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

function mostrarRequisitos(){
let c=document.getElementById("modalContent")

c.innerHTML=`
<span class="closeBtn" onclick="cerrarModal()">✖</span>

<h1>🔑 Ingreso simple</h1>

<p style="text-align:left;font-size:1.3em">
1. DNI o Pasaporte<br>
2. Demostración de ingresos / estudios<br>
3. Contratos de 3 a 12 meses
</p>

<p style="text-align:left;font-size:1.3em">
📅 Al firmar:<br>
1. Mes adelantado<br>
2. Depósito<br>
3. Honorarios
</p>

<button id="aceptar" class="btnWhite" onclick="activarAceptar()">Aceptar requisitos</button>
`

document.getElementById("modal").style.display="flex"
}

function activarAceptar(){
document.getElementById("aceptar").classList.remove("btnWhite")
document.getElementById("aceptar").classList.add("btnGreen")

setTimeout(()=>{
pasoNombre()
},500)
}

function setPaso(texto,campo,tipo){
historial.push(campo)

document.getElementById("modalContent").innerHTML=`
<span class="closeBtn" onclick="cerrarModal()">✖</span>

<h2>${texto}</h2>
<input id="input" type="${tipo}">

<button class="backBtn" onclick="volver()">Atrás</button>
<button onclick="guardar('${campo}')">Continuar</button>
`
}

function pasoNombre(){setPaso("Nombre","nombre","text")}
function pasoPersonas(){setPaso("Cantidad de personas","personas","number")}
function pasoIngreso(){setPaso("Fecha de ingreso","ingreso","date")}
function pasoTiempo(){setPaso("Meses (mínimo 3)","tiempo","number")}

function pasoMascotas(){
historial.push("mascotas")
document.getElementById("modalContent").innerHTML=`
<span class="closeBtn" onclick="cerrarModal()">✖</span>

<h2>Mascotas</h2>
<select id="input">
<option>Si</option>
<option>No</option>
</select>

<button class="backBtn" onclick="volver()">Atrás</button>
<button onclick="guardar('mascotas')">Finalizar</button>
`
}

function volver(){
historial.pop()
let prev=historial.pop()

if(!prev){mostrarRequisitos();return}

if(prev=="nombre") pasoNombre()
if(prev=="personas") pasoPersonas()
if(prev=="ingreso") pasoIngreso()
if(prev=="tiempo") pasoTiempo()
}

function guardar(campo){

let val=document.getElementById("input").value

if(campo=="tiempo" && val<3){
alert("Mínimo 3 meses")
return
}

formData[campo]=val

if(campo=="nombre") pasoPersonas()
else if(campo=="personas") pasoIngreso()
else if(campo=="ingreso") pasoTiempo()
else if(campo=="tiempo") pasoMascotas()
else enviarWhatsApp()
}

function enviarWhatsApp(){

let texto=`Hola! mi nombre es ${formData.nombre} Quiero mas info sobre este depa:

📍 ${depto["Dirección"]} - ${depto["Barrio"]}

👥 ${formData.personas} personas
📅 ${formData.ingreso}
⏳ ${formData.tiempo} meses
🐶 ${formData.mascotas}
`

window.open("https://wa.me/5491168686694?text="+encodeURIComponent(texto))

cerrarModal()
}

</script>

</body>
</html>
