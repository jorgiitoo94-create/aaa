<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Departamento</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
font-size:20px;
}

.container{max-width:900px;margin:auto;padding-bottom:120px;}

.hero{text-align:center;padding:40px;}

h1{font-size:2.2em;}

.barrioGrande{
font-size:2.5em;
font-weight:bold;
color:#38bdf8;
}

.precio{color:#facc15;font-size:2.2em;margin-top:10px;}

.galeria{display:flex;overflow-x:auto;gap:12px;padding:20px;}
.galeria img{height:220px;border-radius:12px;cursor:pointer;}

.box{
background:#1e293b;
padding:30px;
border-radius:14px;
margin:12px;
font-size:2em;
}

h2{font-size:1.2em;}

.direccionGrande{
font-size:4em;
}

.ambientesGrande{
font-size:5em;
font-weight:bold;
color:#38bdf8;
}

.cta{
position:fixed;
bottom:0;
width:100%;
background:#25D366;
text-align:center;
padding:22px;
font-size:1.4em;
cursor:pointer;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modalContent{
background:#1e293b;
padding:40px;
border-radius:12px;
width:95%;
max-width:500px;
text-align:center;
font-size:1.5em;
position:relative;
}

.closeBtn{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
font-size:1.5em;
}

input, select{
width:90%;
padding:15px;
margin-top:15px;
border-radius:8px;
border:none;
font-size:1em;
}

button{
margin-top:20px;
padding:15px 25px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:1em;
cursor:pointer;
}

button:disabled{
background:#555;
cursor:not-allowed;
}

.backBtn{
background:#334155;
margin-right:10px;
}

#mapa{
width:100%;
aspect-ratio:1/1;
border:none;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<div id="barrio" class="barrioGrande"></div>
<h1 id="titulo"></h1>
<div class="precio" id="precio"></div>
</div>

<div class="galeria" id="galeria"></div>

<div class="box">
<h2>Tu espacio ideal en Buenos Aires</h2>
<div id="direccion" class="direccionGrande"></div>
</div>

<div class="box">
<h2>Ambientes</h2>
<div id="ambientes" class="ambientesGrande"></div>
</div>

<div class="box">
<h2>Lo que incluye</h2>
<div id="incluye"></div>
</div>

<div class="box">
<h2>Ubicación estratégica</h2>
<iframe id="mapa" onclick="abrirMapa()"></iframe>
</div>

<div class="box">
<h2>Monto a abonar al ingreso (estimado)</h2>
<div id="total"></div>
</div>

</div>

<div class="cta" onclick="iniciarProceso()">
💬 Consultar por WhatsApp
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent" id="modalContent"></div>
</div>

<!-- VISOR DE IMAGEN -->
<div class="modal" id="visor">
<div style="position:relative">
<span class="closeBtn" onclick="cerrarVisor()">✖</span>
<img id="imgGrande" style="max-width:90vw;max-height:90vh;border-radius:12px">
</div>
</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv"

let depto=null
let formData={}
let historial=[]

const params=new URLSearchParams(window.location.search)
const index=params.get("i")

Papa.parse(csvURL,{
download:true,
header:true,
complete:function(results){
let data=results.data.filter(r=>r["Dirección"])
depto=data[index]
cargar()
}
})

function cargar(){

let fotos=depto["Fotos"].split(",").map(f=>{
let id=f.match(/[-\w]{25,}/)
return "https://lh3.googleusercontent.com/d/"+id[0]
})

document.getElementById("barrio").innerText=depto["Barrio"]
document.getElementById("titulo").innerText=depto["Ambientes"]+" ambientes"
document.getElementById("precio").innerText=depto["Valor"]+" / mes"
document.getElementById("direccion").innerText=depto["Dirección"]
document.getElementById("ambientes").innerText=depto["Ambientes"]+" ambientes"
document.getElementById("incluye").innerText=depto["Incluye"]

let valor=parseFloat(depto["Valor"])
let total=valor*3

document.getElementById("total").innerHTML=`
Mes adelantado: USD ${valor}<br>
Depósito: USD ${valor}<br>
Honorarios: USD ${valor}<br><br>
<b>Total: USD ${total}</b>
`

document.getElementById("mapa").src=
"https://maps.google.com/maps?q="+encodeURIComponent(depto["Dirección"]+", Buenos Aires")+"&output=embed"

let g=document.getElementById("galeria")

fotos.forEach(f=>{
let img=document.createElement("img")
img.src=f
img.onclick=()=>abrirVisor(f)
g.appendChild(img)
})

}

function abrirVisor(src){
document.getElementById("imgGrande").src=src
document.getElementById("visor").style.display="flex"
}

function cerrarVisor(){
document.getElementById("visor").style.display="none"
}

function abrirMapa(){
window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(depto["Dirección"]+", Buenos Aires"))
}

// ===== FLUJO =====

function iniciarProceso(){
historial=[]
mostrarRequisitos()
}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

function mostrarRequisitos(){
let c=document.getElementById("modalContent")

c.innerHTML=`
<span class="closeBtn" onclick="cerrarModal()">✖</span>
<h2>Requisitos</h2>
<p style="text-align:left">
• DNI o pasaporte<br>
• Demostración de ingresos<br>
• Primer mes adelantado<br>
• Depósito<br>
• Honorarios<br>
• Contratos 3 a 12 meses
</p>

<button id="btnAceptar" onclick="activarAceptar()">Aceptar requisitos</button>
<button id="btnContinuar" onclick="pasoNombre()" style="display:none">Continuar</button>
`

document.getElementById("modal").style.display="flex"
}

function activarAceptar(){
let btn=document.getElementById("btnAceptar")
btn.style.background="#22c55e"
document.getElementById("btnContinuar").style.display="block"
}

function pasoNombre(){setPregunta("Nombre completo","nombre","text")}
function pasoPersonas(){setPregunta("¿Cuántas personas?","personas","number")}
function pasoIngreso(){setPregunta("Fecha de ingreso","ingreso","date")}
function pasoTiempo(){setPregunta("¿Por cuánto tiempo (meses)?","tiempo","number")}
function pasoMascotas(){setSelect("¿Tenés mascotas?","mascotas")}

function setPregunta(texto,campo,tipo){

historial.push(campo)

let c=document.getElementById("modalContent")

c.innerHTML=`
<span class="closeBtn" onclick="cerrarModal()">✖</span>
<h2>${texto}</h2>
<input id="input" type="${tipo}">

<div>
<button class="backBtn" onclick="volver()">Atrás</button>
<button onclick="guardar('${campo}')">Continuar</button>
</div>
`
}

function setSelect(texto,campo){

historial.push(campo)

let c=document.getElementById("modalContent")

c.innerHTML=`
<span class="closeBtn" onclick="cerrarModal()">✖</span>
<h2>${texto}</h2>

<select id="input">
<option value="Sí">Sí</option>
<option value="No">No</option>
</select>

<button onclick="guardar('${campo}')">Continuar</button>
`
}

function volver(){

historial.pop()
let anterior=historial.pop()

if(!anterior){
mostrarRequisitos()
return
}

if(anterior=="nombre") pasoNombre()
if(anterior=="personas") pasoPersonas()
if(anterior=="ingreso") pasoIngreso()
if(anterior=="tiempo") pasoTiempo()

}

function guardar(campo){

let val=document.getElementById("input").value
formData[campo]=val

if(campo=="nombre") pasoPersonas()
else if(campo=="personas") pasoIngreso()
else if(campo=="ingreso") pasoTiempo()
else if(campo=="tiempo") pasoMascotas()
else if(campo=="mascotas") mostrarBotonFinal()

}

function mostrarBotonFinal(){

let c=document.getElementById("modalContent")

c.innerHTML=`
<span class="closeBtn" onclick="cerrarModal()">✖</span>
<h2>Listo 👌</h2>

<button onclick="enviarWhatsApp()">
💬 Consultar por WhatsApp
</button>
`
}

function enviarWhatsApp(){

let texto=`Hola! mi nombre es ${formData.nombre} Quiero mas info sobre este depa:

📍 ${depto["Dirección"]} - ${depto["Barrio"]}

👥 Personas: ${formData.personas}
📅 Ingreso: ${formData.ingreso}
⏳ Tiempo: ${formData.tiempo}
🐶 Mascotas: ${formData.mascotas}
`

window.open("https://wa.me/5491168686694?text="+encodeURIComponent(texto))

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
